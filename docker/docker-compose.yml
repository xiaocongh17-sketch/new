services:
  backend:
    build:
      context: ../backend
    volumes:
      - ../backend/dev.db:/app/dev.db
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./dev.db
      - DATABASE_SYNC_URL=sqlite:///./dev.db
      - AI_PROVIDER=deepseek
      - AI_BASE_URL=https://api.deepseek.com
      - AI_MODEL=deepseek-v4-flash
    networks:
      - ai-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    environment:
      - NEXT_PUBLIC_API_URL=
    networks:
      - ai-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ai-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge
