name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker/**"
      - "Dockerfile*"

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          tags: ai-store-copilot/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          tags: ai-store-copilot/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
